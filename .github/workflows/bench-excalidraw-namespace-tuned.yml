name: bench-excalidraw-namespace-tuned
on:
  workflow_dispatch:
jobs:
  install:
    runs-on: namespace-profile-asgar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Namespace runner profile must have caching enabled (out-of-band config).
      - uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: |
            ~/.cache/yarn
            node_modules
      - run: yarn install --frozen-lockfile
